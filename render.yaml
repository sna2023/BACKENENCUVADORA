services:
  - type: web
    name: incubadora-backend
    env: php
    buildCommand: composer install --no-dev --optimize-autoloader
    startCommand: php artisan migrate --force --seed && php artisan config:clear && vendor/bin/heroku-php-apache2 public/
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "true"
      - key: APP_KEY
        generateValue: true
      - key: APP_URL
        value: https://backenencuvadora-2.onrender.com
      - key: APP_NAME
        value: UniIncubadora
      - key: DB_CONNECTION
        value: pgsql
      - key: DB_HOST
        sync: false
      - key: DB_PORT
        value: "5432"
      - key: DB_DATABASE
        sync: false
      - key: DB_USERNAME
        sync: false
      - key: DB_PASSWORD
        sync: false
      - key: FRONTEND_URL
        value: https://fronteencuvadora.onrender.com
      - key: ALLOWED_ORIGINS
        value: https://fronteencuvadora.onrender.com
      - key: SANCTUM_STATEFUL_DOMAINS
        value: fronteencuvadora.onrender.com
      - key: SESSION_DRIVER
        value: cookie
      - key: QUEUE_CONNECTION
        value: sync
      - key: CACHE_STORE
        value: file
      - key: FILESYSTEM_DISK
        value: local
      - key: LOG_CHANNEL
        value: stack
      - key: LOG_LEVEL
        value: debug
